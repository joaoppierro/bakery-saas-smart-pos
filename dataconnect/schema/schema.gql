type Tenant @table {
  id: String!
  name: String!
}

type Product @table {
  id: String!
  tenantId: String!
  sku: String
  name: String!
  type: String!
  unit: String
  costPrice: Float!
  sellPrice: Float!
  currentStock: Float!
  minStock: Float!
  strategicRole: String
  targetMargin: Float
}

type Movement @table {
  id: String!
  tenantId: String!
  productId: String!
  type: String!
  quantity: Float!
  reason: String
  dateString: String!
}

type DemandPrediction @table {
  id: String!
  tenantId: String!
  productId: String!
  targetDate: String!
  predictedQuantity: Float!
  confidenceScore: Float!
}

type DailyContext @table {
  id: String!
  tenantId: String!
  dateString: String!
  weather: String!
  event: String
}

type RuptureLog @table {
  id: String!
  tenantId: String!
  productId: String!
  dateString: String!
  lostQuantity: Float!
  notes: String
}

type RecipeItem @table {
  id: String!
  tenantId: String
  productId: String
  ingredientId: String
  quantity: Float
}

type PricingConfig @table {
  id: String!
  tenantId: String!
  taxesPercent: Float
  cardFeesPercent: Float
  fixedCostsPercent: Float
  profitMarginPercent: Float
}